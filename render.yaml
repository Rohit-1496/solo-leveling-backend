services:
  - type: web
    name: solo-leveling-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: solo-leveling-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
